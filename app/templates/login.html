{% extends "base.html" %}
{% block title %}Sign in | 3X-UI Ratio{% endblock %}
{% block body %}
<main class="login-shell">
  <section class="login-card">
    <div class="login-preferences">
      <button id="login-theme-toggle" class="btn secondary" type="button" aria-label="Change theme">☀ Light</button>
      <button id="login-language-toggle" class="btn secondary" type="button">فارسی</button>
    </div>
    <div class="login-brand-lockup">
      <img class="ratio-logo login-logo" src="/static/ratio-logo.svg?v={{ version }}" alt="3X-UI Ratio logo">
      <h1 class="login-brand-title">3X-UI Ratio</h1>
    </div>
    <p data-login-i18n="tagline">3X-UI Independent Quota Management</p>
    <div class="login-socials" aria-label="Project links">
      <a class="login-social login-social-github" href="https://github.com/rezakhosh78/3x-ui-Ratio" target="_blank" rel="noopener noreferrer" aria-label="3X-UI Ratio on GitHub" title="GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 .8a11.4 11.4 0 0 0-3.6 22.2c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.6-1.4-1.4-1.8-1.4-1.8-1.1-.8.1-.8.1-.8 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.3 2.9.1 3.2.8.9 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A11.4 11.4 0 0 0 12 .8Z"/></svg>
        <span>GitHub</span>
      </a>
      <a class="login-social login-social-telegram" href="https://t.me/pingplas_channel" target="_blank" rel="noopener noreferrer" aria-label="Ping Plus Telegram channel" title="Telegram">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M21.8 3.2 18.6 20c-.2 1.2-.9 1.5-1.9.9l-4.8-3.5-2.3 2.2c-.3.3-.5.5-1 .5l.3-4.9 8.9-8c.4-.3-.1-.5-.6-.2L6.2 13.9l-4.7-1.5c-1-.3-1-1 .2-1.5L20.2 3.8c.9-.3 1.7.2 1.6-.6Z"/></svg>
        <span>Telegram</span>
      </a>
    </div>
    {% if error %}<div class="alert danger" data-login-error>{{ error }}</div>{% endif %}
    <form method="post" action="/login" class="stack">
      <label><span data-login-i18n="username">Username</span><input name="username" autocomplete="username" required autofocus></label>
      <label><span data-login-i18n="password">Password</span><input name="password" type="password" autocomplete="current-password" required></label>
      <button class="btn primary" type="submit" data-login-i18n="sign_in">Sign in</button>
    </form>
    <small><span data-login-i18n="version">Version</span> {{ version }}</small>
    <div class="login-footer">Powered By <strong>ReZa Kh</strong></div>
  </section>
</main>
<script src="/static/login.js?v={{ version }}"></script>
{% endblock %}
