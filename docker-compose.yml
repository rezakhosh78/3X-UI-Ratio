services:
  ratio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3xui-ratio
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${RATIO_BIND:-0.0.0.0}:${RATIO_PORT:-8088}:8000"
    volumes:
      - ./data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
